<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Educação Profissional</title>

<style>

/* BODY */

body{
margin:0;
background:#0e0e0e;
font-family:Arial, sans-serif;

display:flex;
justify-content:center;
align-items:center;

height:100vh;
color:white;
}


/* CARD PRINCIPAL */

.main-card{

width:340px;

padding:30px;

border-radius:16px;

background:#111;

box-shadow:0 0 30px rgba(0,0,0,0.6);

text-align:center;

}


/* AVATAR */

.avatar{

width:90px;
height:90px;

border-radius:50%;

border:3px solid #a855f7;

margin-bottom:15px;

}


/* TITULO */

h1{

font-size:20px;

letter-spacing:1px;

margin-bottom:20px;

}


/* BOTÕES */

.btn{

display:block;

padding:12px;

margin:10px 0;

border-radius:8px;

background:#1a1a1a;

border:1px solid #444;

color:white;

text-decoration:none;

cursor:pointer;

transition:0.25s;

}


/* HOVER BOTÕES */

.btn:hover{

background:#a855f7;

box-shadow:0 0 15px #a855f7;

transform:translateY(-2px);

}


/* MENU TUTORIAIS */

#menuTutoriais{

max-height:0;

overflow:hidden;

transition:max-height 0.35s ease;

}


/* AVISO COPIADO */

#copiado{

opacity:0;

margin-top:10px;

font-size:13px;

color:#22ff88;

transition:0.3s;

}


/* FOOTER */

.footer{

margin-top:20px;

font-size:11px;

opacity:0.6;

}

</style>

</head>

<body>



<div class="main-card">


<img class="avatar" src="https://i.imgur.com/2yYayZk.jpeg">


<h1>EDUCAÇÃO PROFISSIONAL</h1>



<a class="btn" onclick="copiarScript()">COPIAR SCRIPT</a>



<a class="btn" onclick="toggleMenu()">TUTORIAIS</a>



<div id="menuTutoriais">

<a class="btn">ANDROID</a>

<a class="btn">IOS</a>

<a class="btn">PC</a>

</div>



<div id="copiado">✔ Script copiado</div>



<div class="footer">

criação by thur_lag<br>

inspiração by nejizzuki

</div>


</div>



<script>

/* BOTÃO COPIAR */

function copiarScript(){

const codigo = "javascript:void(fetch('https://raw.githubusercontent.com/nejizzuki/eduauto/main/script.js?'+Date.now()).then(function(r){return r.text()}).then(function(t){(1,eval)(t)}))";

navigator.clipboard.writeText(codigo);

let aviso = document.getElementById("copiado");

aviso.style.opacity = "1";

setTimeout(()=>{

aviso.style.opacity = "0";

},2000);

}


/* MENU TUTORIAIS */

function toggleMenu(){

let menu = document.getElementById("menuTutoriais");

if(menu.style.maxHeight){

menu.style.maxHeight = null;

}else{

menu.style.maxHeight = menu.scrollHeight + "px";

}

}

</script>



</body>
</html>
