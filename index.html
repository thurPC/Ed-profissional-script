<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Educação Profissional</title>

<style>
#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}
/* FUNDO DARK PURPLE */

body{

margin:0;
height:100vh;

display:flex;
justify-content:center;
align-items:center;

font-family:Arial;

background:linear-gradient(-45deg,#05020a,#0a0412,#120722,#07030d);
background-size:400% 400%;

animation:gradientBG 12s ease infinite;

color:#b78cff;

}

@keyframes gradientBG{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}


/* CARD GLASS */

.card{

width:340px;

padding:30px;

border-radius:20px;

background:rgba(80,0,120,0.15);

backdrop-filter:blur(14px);

border:1px solid rgba(180,120,255,0.3);

box-shadow:0 0 40px rgba(120,0,200,0.4);

text-align:center;

}


/* AVATAR FLUTUANDO */

.avatar{

width:95px;
height:95px;

border-radius:50%;

border:3px solid #b855ff;

margin-bottom:15px;

animation:float 3s ease-in-out infinite;

}

@keyframes float{

0%{transform:translateY(0px);}
50%{transform:translateY(-8px);}
100%{transform:translateY(0px);}

}


/* TITULO ROXO */

h1{

font-size:20px;

margin-bottom:20px;

color:#c77dff;

text-shadow:
0 0 5px #c77dff,
0 0 15px #a855f7,
0 0 25px #7b2cbf;

}


/* BOTÕES */

.btn{

display:block;

padding:12px;

margin:10px 0;

border-radius:10px;

background:rgba(20,0,40,0.6);

border:1px solid rgba(200,150,255,0.3);

color:white;

text-decoration:none;

cursor:pointer;

transition:0.45s;

}

.icon{

width:18px;

margin-right:8px;

vertical-align:middle;

filter: drop-shadow(0 0 4px #a855f7);

}

/* EFEITO NEON */

.btn:hover{

background:#7b2cbf;

box-shadow:
0 0 5px #c77dff,
0 0 15px #a855f7,
0 0 30px #7b2cbf;

transform:translateY(-2px);

}


/* MENU */

#menuTutoriais{

max-height:0;

overflow:hidden;

transition:max-height 0.55s ease;

}


/* TEXTO COPIADO */

#copiado{

opacity:0;

font-size:13px;

color:#8cffc1;

transition:5.5s;

margin-top:10px;

}


/* FOOTER */

.footer{

margin-top:20px;

font-size:14px;

opacity:0.6;

}
.coroa{

display:inline-block;

animation:girar 4s linear infinite;

font-size:11px;

margin:0 4px;

}

@keyframes girar{

0%{
transform:rotate(0deg);
}

100%{
transform:rotate(360deg);
}

</style>

</head>

<body>

<canvas id="particles"></canvas>

<div class="card">

<img class="avatar" src="https://i.imgur.com/mtM4X0h.jpeg">

<h1>EDUCAÇÃO PROFISSIONAL</h1>


<a class="btn" onclick="copiarScript()">COPIAR SCRIPT</a>

<a class="btn" onclick="toggleMenu()">TUTORIAIS</a>


<div id="menuTutoriais">

<a class="btn" href="https://m.youtube.com/watch?v=lLxJEeiicKM" target="_blank">
<img class="icon" src="https://cdn.simpleicons.org/android/a855f7">
ANDROID
</a>

<a class="btn" href="https://m.youtube.com/watch?v=nP4FJBZutMg" target="_blank">
<img class="icon" src="https://cdn.simpleicons.org/apple/a855f7">
IOS
</a>

<a class="btn" href="https://m.youtube.com/watch?v=LllOlRN7xxQ" target="_blank">
<img class="icon" src="https://cdn.simpleicons.org/windows/a855f7">
PC
</a>

</div>
  

<a class="btn" href="https://discord.gg/7ux9D5Fyn" target="_blank">
DISCORD
</a>


<div id="copiado">✔ Script copiado</div>


<div class="footer">

<span class="coroa">👑</span> criação by thur._lag <span class="coroa">👑</span><br>
inspiration and tutorial by nejizzuki

</div>


</div>


<script>

/* COPIAR SCRIPT */

function copiarScript(){

const codigo="javascript:void(fetch('https://thurpc.github.io/Ed-profissional-script/script.js?'+Date.now()).then(r=>r.text()).then(t=>(1,eval)(t)))";

navigator.clipboard.writeText(codigo);

let aviso=document.getElementById("copiado");

aviso.style.opacity="1";

setTimeout(()=>{

aviso.style.opacity="0";

},2000);

}


/* MENU TUTORIAIS */

function toggleMenu(){

let menu=document.getElementById("menuTutoriais");

if(menu.style.maxHeight){

menu.style.maxHeight=null;

}else{

menu.style.maxHeight=menu.scrollHeight+"px";

}

}

</script>
<script>

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<50;i++){

particles.push({
x: Math.random()*canvas.width,
y: Math.random()*canvas.height,
size: Math.random()*2+1,
speedX: (Math.random()-0.5)*0.3,
speedY: (Math.random()-0.5)*0.3
});

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

p.x+=p.speedX;
p.y+=p.speedY;

if(p.x<0||p.x>canvas.width) p.speedX*=-1;
if(p.y<0||p.y>canvas.height) p.speedY*=-1;

ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fillStyle="rgba(168,85,247,0.8)";
ctx.fill();

});

requestAnimationFrame(animate);

}

animate();

  </script>
</body>
</html>
