<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Educação Profissional</title>

<style>

/* FUNDO CYBERPUNK */

body{
margin:0;
font-family:Arial;
height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(120deg,#0f0c29,#302b63,#24243e);

background-size:400% 400%;

animation:fundo 15s ease infinite;

color:white;
}

@keyframes fundo{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}


/* CARD GLASS */

.card{

width:340px;

padding:30px;

border-radius:18px;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(15px);
-webkit-backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,0.2);

box-shadow:0 0 40px rgba(0,0,0,0.6);

text-align:center;

}


/* AVATAR */

.avatar{

width:95px;
height:95px;

border-radius:50%;

border:3px solid #a855f7;

margin-bottom:15px;

animation:flutuar 3s ease-in-out infinite;

}

/* ANIMAÇÃO AVATAR */

@keyframes flutuar{

0%{transform:translateY(0px);}
50%{transform:translateY(-8px);}
100%{transform:translateY(0px);}

}


/* TITULO */

h1{

font-size:20px;

margin-bottom:20px;

letter-spacing:1px;

}


/* BOTÕES */

.btn{

display:block;

padding:12px;

margin:10px 0;

border-radius:10px;

background:rgba(0,0,0,0.4);

border:1px solid rgba(255,255,255,0.2);

color:white;

text-decoration:none;

cursor:pointer;

transition:0.25s;

}


/* NEON */

.btn:hover{

box-shadow:
0 0 5px #a855f7,
0 0 15px #a855f7,
0 0 30px #a855f7;

background:#a855f7;

transform:translateY(-2px);

}


/* MENU */

#menuTutoriais{

max-height:0;

overflow:hidden;

transition:max-height 0.35s ease;

}


/* AVISO COPIADO */

#copiado{

opacity:0;

font-size:13px;

color:#22ff88;

transition:0.3s;

margin-top:10px;

}


/* FOOTER */

.footer{

margin-top:20px;

font-size:11px;

opacity:0.6;

}

</style>

</head>

<body>


<div class="card">

<img class="avatar" src="https://i.imgur.com/2yYayZk.jpeg">

<h1>EDUCAÇÃO PROFISSIONAL</h1>


<a class="btn" onclick="copiarScript()">COPIAR SCRIPT</a>

<a class="btn" onclick="toggleMenu()">TUTORIAIS</a>


<div id="menuTutoriais">

<a class="btn">ANDROID</a>

<a class="btn">IOS</a>

<a class="btn">PC</a>

</div>


<a class="btn" href="https://discord.gg/7ux9D5Fyn" target="_blank">
NOSSO DISCORD
</a>


<div id="copiado">✔ Script copiado</div>


<div class="footer">

criação by thur_lag<br>
inspiração by nejizzuki

</div>


</div>


<script>

/* COPIAR SCRIPT */

function copiarScript(){

const codigo = "javascript:void(fetch('https://raw.githubusercontent.com/nejizzuki/eduauto/main/script.js?'+Date.now()).then(function(r){return r.text()}).then(function(t){(1,eval)(t)}))";

navigator.clipboard.writeText(codigo);

let aviso = document.getElementById("copiado");

aviso.style.opacity="1";

setTimeout(()=>{

aviso.style.opacity="0";

},2000);

}


/* MENU */

function toggleMenu(){

let menu = document.getElementById("menuTutoriais");

if(menu.style.maxHeight){

menu.style.maxHeight=null;

}else{

menu.style.maxHeight=menu.scrollHeight+"px";

}

}

</script>

</body>
</html>
