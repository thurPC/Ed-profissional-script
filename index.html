<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Educação Profissional</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0e0e0e;
font-family:Arial;
}

/* CARD */

.card{
padding:40px;
border-radius:20px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.2);
text-align:center;
color:white;
}

/* BOTÕES */

.btn{
display:block;
margin:15px;
padding:15px;
border-radius:10px;
background:#1a1a1a;
color:white;
text-decoration:none;
transition:0.3s;
cursor:pointer;
}

.btn:hover{
box-shadow:0 0 15px #a855f7;
transform:translateY(-2px);
}

/* MENU */

#menuTutoriais{
max-height:0;
overflow:hidden;
transition:max-height 0.4s ease;
}

</style>

</head>

<body>

<div class="card">

<h2>EDUCAÇÃO PROFISSIONAL</h2>

<a class="btn" onclick="copiarScript()">COPIAR SCRIPT</a>

<a class="btn" onclick="toggleMenu()">TUTORIAIS</a>

<div id="menuTutoriais">

<a class="btn">ANDROID</a>
<a class="btn">IOS</a>
<a class="btn">PC</a>

</div>

</div>

<script>

function copiarScript(){

const codigo = "javascript:void(fetch('https://raw.githubusercontent.com/nejizzuki/eduauto/main/script.js?'+Date.now()).then(function(r){return r.text()}).then(function(t){(1,eval)(t)}))";

navigator.clipboard.writeText(codigo);

alert("Script copiado!");

}

function toggleMenu(){

let menu = document.getElementById("menuTutoriais");

if(menu.style.maxHeight){

menu.style.maxHeight = null;

}else{

menu.style.maxHeight = menu.scrollHeight + "px";

}

}

</script>

</body>
</html>
